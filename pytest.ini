[pytest]
markers =
    smoke: quick smoke tests that should run in CI smoke jobs
    integration: tests that require heavy native dependencies (optuna, numba, umap) and should run in the `dataselector` conda environment
    real_tiles: tests that use real KDR tile images from tests/fixtures/real_tiles/
    geo: tests requiring geospatial dependencies
testpaths = tests
norecursedirs = .git .venv venv env outputs scripts archive archive_local data docs notebooks
filterwarnings =
    ignore:.*n_neighbors is larger than the dataset size.*:UserWarning
    ignore:The balance properties of Sobol.*:UserWarning
    ignore:.*numba.*:UserWarning
    ignore:.*MKL.*:UserWarning
    ignore:.*xFormers is not available.*:UserWarning
