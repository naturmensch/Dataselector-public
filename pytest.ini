[pytest]
markers =
    smoke: quick smoke tests that should run in CI smoke jobs
testpaths = tests
norecursedirs = .git .venv venv env outputs scripts archive_local data docs notebooks
filterwarnings =
    ignore:.*n_neighbors is larger than the dataset size.*:UserWarning
    ignore:The balance properties of Sobol.*:UserWarning
    ignore:.*numba.*:UserWarning
    ignore:.*MKL.*:UserWarning
    ignore:.*xFormers is not available.*:UserWarning
