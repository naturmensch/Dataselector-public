[pytest]
minversion = 6.0
addopts = -ra -q --strict-markers
testpaths =
    tests
markers =
    e2e: End-to-End tests that run the full pipeline (slow or mocked).
    slow: Marks tests as slow (deselect with '-m "not slow"').
    integration: Tests that involve multiple components.

log_cli = true
log_cli_level = INFO
