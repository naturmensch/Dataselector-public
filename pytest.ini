[pytest]
markers =
    smoke: quick smoke tests that should run in CI smoke jobs
    integration: tests that require heavy native dependencies (optuna, numba, umap) and should run in the `dataselector` conda environment
    real_tiles: tests that use real KDR tile images from tests/fixtures/real_tiles/
    geo: tests requiring geospatial dependencies
    e2e: end-to-end scenarios spanning multiple workflow steps
    adaptive: adaptive pipeline behavior checks
    autoscale: autoscale workflow behavior checks
    bootstrap: bootstrap workflow contract checks
    error: negative/error-path behavior checks
    selection: final-selection command and behavior checks
    optuna: optuna persistence and optimization checks
    recovery: resume/recovery workflow checks
    sampler: sampler-suite and sampler orchestration checks
    uq: uncertainty-quantification behavior checks
    workflow: orchestration-level workflow checks
    xxl: XXL workflow checks
    unit: lightweight unit-level checks
    fast: quick non-smoke checks
    slow: longer-running checks
    real_images: requires private/local real image directory via DATASELECTOR_IMAGE_DIR
    real_tiles: legacy alias for real_images marker
testpaths = tests
norecursedirs = .git .venv venv env outputs scripts archive archive_local data docs notebooks
filterwarnings =
    ignore:.*n_neighbors is larger than the dataset size.*:UserWarning
    ignore:The balance properties of Sobol.*:UserWarning
    ignore:.*numba.*:UserWarning
    ignore:.*MKL.*:UserWarning
    ignore:.*xFormers is not available.*:UserWarning
