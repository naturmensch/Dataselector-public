repos:
  - repo: https://github.com/psf/black
    rev: 23.9.1
    hooks:
      - id: black
        args: [--fast]

  - repo: https://github.com/PyCQA/isort
    rev: 5.12.0
    hooks:
      - id: isort

  - repo: https://github.com/charliermarsh/ruff-pre-commit
    # Pin to a stable ruff-pre-commit release compatible with our environment
    rev: v0.3.0
    hooks:
      - id: ruff
        args: [--fix]

  - repo: local
    hooks:
      - id: check-protected
        name: Check protected paths
        entry: python scripts/check_protected.py
        language: system
        pass_filenames: false
        stages: [commit]
        files: ''
      - id: check-env-usage
        name: Check environment usage
        entry: python scripts/check_env_usage.py
        language: system
        pass_filenames: false
        stages: [pre-commit, commit, push]
        files: "(^scripts/.*|^Makefile$|^\.github/workflows/.*|^tests/.*)"
