name: dataselector
channels:
  - conda-forge
  - pytorch
  - defaults
dependencies:
  - python=3.11
  - pandas=2
  - numpy
  - scipy
  - scikit-learn
  - umap-learn
  - apricot-select
  - optuna
  - matplotlib
  - seaborn
  - pyyaml
  - tqdm
  # Geospatial stack (install from conda-forge)
  - geopandas=0.15.1
  - pyproj=3.7.1
  - shapely=2.0.1
  - fiona=1.9.4
  - rtree=0.9.8
  - gdal=3.7.2
  - rasterio=1.3.8
  - pip:
    - torch>=2.0.0
    - torchvision>=0.15.0
    - Pillow>=10.0.0
    - pandas>=2.0.0
    - numpy>=1.24.0
    - dbfread>=2.0.7
    - scikit-learn>=1.3.0
    - umap-learn>=0.5.3
    - scipy>=1.7.0
    - apricot-select>=0.6.0
    - optuna>=3.0.0
    - cmaes>=0.10.0
    - matplotlib>=3.7.0
    - seaborn>=0.12.0
    - tqdm>=4.65.0
    - pyyaml>=6.0
    - pytest>=7.0.0
    - flake8>=6.0.0
    - mypy>=1.9.0
    - geopandas==0.15.1
    - pyproj==3.7.1
    - shapely==2.0.1
    - fiona==1.9.4
    - rtree==0.9.8
    - rasterio==1.3.8
