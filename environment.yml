name: dataselector
channels:
  - conda-forge
  - pytorch
  - defaults
dependencies:
  - python=3.11
  - pandas=2
  - numpy
  - scipy
  - scikit-learn
  - umap-learn
  - apricot-select
  - optuna
  - matplotlib
  - seaborn
  - pyyaml
  - tqdm
  # Geospatial stack (install from conda-forge)
  - geopandas=0.15.1
  - pyproj=3.7.1
  - shapely=2.0.1
  - fiona=1.9.4
  - rtree=0.9.8
  - rasterio=1.3.8
  - pip
  - pip:
    - -r requirements-cpu.txt
    - -r requirements-geo.txt
