name: dataselector
channels:
  - conda-forge
  - pytorch
  - defaults
dependencies:
  - python=3.11
  - pandas=2
  - numpy<2.4  # Pin NumPy <2.4 for numba compatibility (numba needs <=2.3)
  - numba=0.63.1
  - scipy
  - scikit-learn
  - umap-learn
  - apricot-select
  # PyTorch (from pytorch channel)
  - pytorch::pytorch
  - pytorch::torchvision
  - optuna
  - matplotlib
  - seaborn
  - pyyaml
  - tqdm
  # Geospatial stack (install from conda-forge)
  - geopandas>=0.14.0
  - pyproj>=3.6.0
  - shapely>=2.0.0
  - fiona>=1.9.0
  - rtree>=0.9.0
  - gdal>=3.10.0
  - rasterio>=1.3.0
  - pip
  - pip:
    - Pillow>=10.0.0
    - dbfread>=2.0.7
    - cmaes>=0.10.0
    - pytest>=7.0.0
    - flake8>=6.0.0
    - mypy>=1.9.0
    - wandb>=0.15.0  # Weights & Biases for experiment tracking
