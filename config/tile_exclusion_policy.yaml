version: 1
description: >
  Tile exclusion policy for thesis_repro candidate pool construction.
  Rules in this file are applied before feature extraction and split construction.

constants:
  kdr_core_publication_frame:
    year_min: 1878
    year_max: 1945

rules:
  - id: exclude_kdr_155b_duplicate_variant
    class: representation_duplicate_variant
    action: exclude_from_candidate_pool
    rationale: >
      KDR_155b is a newer representation variant of KDR_155 (different map style).
      Keep KDR_155 as canonical and exclude KDR_155b from candidate pool to avoid
      representation-duplicate leakage.
    match:
      shortName:
        - KDR_155b
  - id: flag_pre_kdr_series_temporal_outliers
    class: temporal_scope_outlier
    action: flag_for_reporting
    rationale: >
      Tiles dated before the core KDR publication frame remain
      reportable if they are otherwise usable, but must be marked critically as
      retained temporal outliers because they fall outside the thesis core
      temporal frame.
    match:
      year_lt_ref: kdr_core_publication_frame.year_min
  - id: flag_post_kdr_series_temporal_outliers
    class: temporal_scope_outlier
    action: flag_for_reporting
    rationale: >
      Tiles dated after the core KDR publication frame remain
      reportable if they are otherwise usable, but must be marked critically as
      retained temporal outliers because they fall outside the thesis core
      temporal frame.
    match:
      year_gt_ref: kdr_core_publication_frame.year_max
