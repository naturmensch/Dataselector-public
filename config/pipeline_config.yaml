# KDR100 Datenselektion - Pipeline Konfiguration

# Datenpfade
data:
  metadata_path: "data/new_all_tiles.csv"  # aktualisiert auf konvertierte CSV
  csv_path: "data/new_all_tiles.csv"
  image_dir: "data/images"

# Global feature flags
features:
  geo: true  # Enable geo-aware processing (requires geo stack: geopandas, pyproj, shapely, fiona, rtree)

# Feature Extraction (Deep Learning)
feature_extraction:
  model: "dinov2"  # Optionen: 'resnet50', 'dinov2'
  model_variant: "dinov2_vits14"
  dinov2_repo: "facebookresearch/dinov2"
  dinov2_ref: "main"
  pooling: "cls"  # Optionen: 'cls', 'mean'
  input_size: 392
  resnet_input_size: 224
  batch_size: 8
  crop_size: [2048, 2048]
  device: "auto"  # 'cuda', 'cpu', oder 'auto'

# Clustering (UMAP + K-Means)
clustering:
  n_clusters: 8
  umap_components: 2
  umap_n_neighbors: 15
  umap_min_dist: 0.1
  umap_metric: "cosine"
  # UMAP randomness: set to a fixed integer for reproducibility or null for non-deterministic + parallelism
  umap_random_state: 2026  # empirically fastest seed on this notebook (benchmarked)
  # Number of jobs for UMAP when non-deterministic (set -1 to use all CPUs)
  umap_n_jobs: 1

# Diversity Selection (Multi-Criteria Facility Location)
# Updated: 2026-02-09 based on canonical dataset checks and policy gate
# Dataset reference: canonical `data/new_all_tiles.csv` (currently 676 tiles)
# Thesis default: 24 samples (minimum-sufficient from Phase4H n-panel, 2026-02-09)
selection:
  n_samples: 24  # Explicit thesis production target. No implicit fallback is used in workflows.
  metric: "euclidean"
  
  # DEPRECATED: Legacy parameters (use multi-criteria instead)
  temporal_weight: 0.25  # Kept for backward compatibility
  
  # Multi-Criteria weights (REQUIRED for use_multi_criteria=true)
  alpha_visual: 0.40     # Optuna-best (empirisch validiert) — Default für quick runs
  beta_spatial: 0.30      # Optuna-best (empirisch validiert)
  gamma_temporal: 0.30    # Optuna-best (empirisch validiert)
  # Optional: Pre-selection (seed) — set names (e.g. ['Hamburg']) or indices (e.g. [145])
  pre_selected_names: null  # DISABLED FOR OPTUNA COMPARISON
  # pre_selected_indices: [145]
  
  # Spatial constraint
  # Policy split:
  # - geometric reference on canonical metadata: ~45.0 km (median NN)
  # - operational thesis policy: 28.5 km (decision gate; tie-break prefers smaller
  #   distance when quality is statistically equivalent, preserving combination space)
  spatial_constraint: true
  min_distance_km: 28.5
  
  # Method selection (IMPORTANT)
  use_multi_criteria: true           # REQUIRED: Unified distance metric
  use_constraint_integration: false  # Legacy constraint-integrated mode
  
  # Seeds for reproducible validation experiments (bootstrap / cv)
  random_state: 42
  validation_seeds: [42, 43, 44, 45, 46]
  
# Expected results are tracked in timestamped decision artifacts:
# - reports_2026-02-09/MIN_DISTANCE_DECISION_2026-02-09.md
# - reports_2026-02-09/N_SAMPLES_DECISION_2026-02-09.md

# Output
output:
  dir: "outputs/runs"
  prefix: "kdr100_selection"
  create_visualizations: true
